<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Async Chess</title>
<script src="https://unpkg.com/chess.js@0.10.3/chess.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#12121f;color:#e8e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
h1{font-size:1.8rem;color:#d4c8ff;margin-bottom:4px}
.sub{color:#6060a0;font-size:.9rem;margin-bottom:28px}

/* HOME */
#view-home{display:flex;flex-direction:column;align-items:center;width:100%;max-width:440px}
.card{background:#1a1a30;border:1px solid #2a2a48;border-radius:12px;padding:22px;width:100%;margin-bottom:14px}
.card h2{font-size:1rem;color:#b0a8d8;margin-bottom:14px}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.time-btn{background:#0d2540;border:2px solid #1a3a5a;border-radius:8px;color:#d0d0f0;padding:10px 4px;cursor:pointer;font-size:.85rem;transition:all .15s}
.time-btn:hover{background:#1a3a5a}
.time-btn.sel{background:#7c3aed;border-color:#7c3aed;color:#fff}
.btn{background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:12px 20px;font-size:1rem;cursor:pointer;width:100%;font-weight:600;transition:background .15s}
.btn:hover{background:#6d28d9}
.btn.ghost{background:#0d2540;margin-top:8px}
.btn.ghost:hover{background:#1a3a5a}
.join-row{display:flex;gap:8px}
.join-row input{flex:1;background:#0a0a18;border:1px solid #2a2a48;border-radius:8px;color:#e8e8f0;padding:11px;font-size:.95rem}
.join-row .btn{width:auto}
.setup-note{color:#3a3a60;font-size:.75rem;text-align:center;margin-top:12px;line-height:1.5}
.setup-note code{color:#5050a0;background:#0a0a18;padding:1px 5px;border-radius:4px}

/* GAME */
#view-game{display:flex;flex-direction:column;align-items:center;width:100%}
.game-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:.8rem;color:#5050a0}
.gid{background:#1a1a30;border:1px solid #2a2a48;border-radius:5px;padding:3px 10px;font-family:monospace;color:#8080c0;cursor:pointer;letter-spacing:1px}
.gid:hover{border-color:#7c3aed}

/* Player bars */
.pbar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:540px;padding:10px 14px;background:#1a1a30;border:2px solid transparent;border-radius:9px;margin:5px 0;transition:border-color .3s}
.pbar.active-turn{border-color:#7c3aed}
.pname{display:flex;align-items:center;gap:9px;font-weight:600;font-size:.9rem}
.dot{width:13px;height:13px;border-radius:50%}
.dot.w{background:#f0d9b5;border:2px solid #b58863}
.dot.b{background:#1a1a1a;border:2px solid #888}
.timer{font-size:1.5rem;font-weight:700;font-family:monospace;color:#d0d0f0;min-width:60px;text-align:right}
.timer.low{color:#f87171;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* Board area */
.board-wrap{position:relative;margin:5px 0;line-height:0}
.board{display:grid;grid-template-columns:repeat(8,62px);grid-template-rows:repeat(8,62px);border:3px solid #2a2a48;border-radius:3px}
.sq{width:62px;height:62px;display:flex;align-items:center;justify-content:center;font-size:44px;cursor:pointer;position:relative}
.sq.lt{background:#f0d9b5}
.sq.dk{background:#b58863}
.sq.sel{background:#4ade80 !important}
.sq.lf{background:rgba(250,204,21,.4) !important}
.sq.lt2{background:rgba(250,204,21,.6) !important}
.sq.chk{background:rgba(239,68,68,.55) !important}
.sq.vm::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.28);pointer-events:none}
.sq.vc::after{content:'';position:absolute;width:60px;height:60px;border-radius:50%;border:5px solid rgba(0,0,0,.28);background:transparent;pointer-events:none}

/* Overlay */
.overlay{position:absolute;inset:0;background:#0e0e1c;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:10;border-radius:1px}
.ov-icon{font-size:2.8rem}
.ov-title{font-size:1.15rem;font-weight:700;color:#d4c8ff;text-align:center;padding:0 16px}
.ov-sub{color:#6060a0;font-size:.85rem;text-align:center;max-width:220px;line-height:1.5}
.btn-start{background:#16a34a;color:#fff;border:none;border-radius:9px;padding:13px 32px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .15s}
.btn-start:hover{background:#15803d}

/* Status */
.status-bar{width:100%;max-width:540px;min-height:34px;background:#1a1a30;border:1px solid #2a2a48;border-radius:7px;padding:7px 14px;font-size:.85rem;color:#9090c0;text-align:center;margin-top:4px}

/* Controls */
.controls{display:flex;gap:8px;margin-top:10px;width:100%;max-width:540px}
.btn-share{flex:1;background:#0a0a18;border:1px solid #2a2a48;border-radius:8px;color:#6060a0;padding:9px 12px;font-size:.8rem;cursor:pointer;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-share:hover{border-color:#7c3aed;color:#9090c0}
.btn-resign{background:#2a0010;border:1px solid #4a0020;color:#f87171;border-radius:8px;padding:9px 16px;cursor:pointer;font-size:.85rem}
.btn-resign:hover{background:#3a0018}
.btn-newgame{background:#0d2540;border:1px solid #1a3a5a;color:#90b0d0;border-radius:8px;padding:9px 16px;cursor:pointer;font-size:.85rem}
.btn-newgame:hover{background:#1a3a5a}

/* Move history */
.hist{background:#1a1a30;border:1px solid #2a2a48;border-radius:9px;padding:12px 14px;width:100%;max-width:540px;margin-top:10px;max-height:130px;overflow-y:auto}
.hist-label{font-size:.72rem;color:#4040708;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;color:#505080}
.hist-grid{display:grid;grid-template-columns:28px 1fr 1fr;gap:3px;font-size:.88rem}
.mn{color:#404070}
.ms{color:#b0a8d8}

/* Promo modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#1a1a30;border:1px solid #2a2a48;border-radius:12px;padding:24px;text-align:center}
.modal h3{margin-bottom:16px;color:#d4c8ff}
.promo-row{display:flex;gap:8px}
.pbtn{background:#0d2540;border:2px solid #1a3a5a;border-radius:8px;width:68px;height:68px;font-size:46px;cursor:pointer}
.pbtn:hover{background:#1a3a5a}

.hidden{display:none!important}
</style>
</head>
<body>

<h1>♟ Async Chess</h1>
<p class="sub">Play turn-by-turn across any timezone</p>

<!-- HOME VIEW -->
<div id="view-home">
  <div class="card">
    <h2>Create New Game</h2>
    <p style="color:#505080;font-size:.82rem;margin-bottom:11px">Time per player:</p>
    <div class="time-grid" id="time-grid">
      <button class="time-btn" data-ms="300000">5 min</button>
      <button class="time-btn sel" data-ms="600000">10 min</button>
      <button class="time-btn" data-ms="900000">15 min</button>
      <button class="time-btn" data-ms="1800000">30 min</button>
    </div>
    <button class="btn" id="btn-create">Create Game (You play White)</button>
  </div>

  <div class="card">
    <h2>Join a Game</h2>
    <div class="join-row">
      <input id="join-input" type="text" placeholder="Game code e.g. ABC123" maxlength="8" style="text-transform:uppercase" />
      <button class="btn" id="btn-join" style="width:auto">Join</button>
    </div>
  </div>

  <p class="setup-note">
    Requires Firebase Firestore — open <code>chess.html</code> and fill in<br>
    <code>FIREBASE_CONFIG</code> with your project credentials.
  </p>
</div>

<!-- GAME VIEW -->
<div id="view-game" class="hidden">
  <div class="game-meta">
    <span>Game</span>
    <span class="gid" id="gid-label" title="Click to copy"></span>
    <span id="color-label" style="color:#7c3aed"></span>
  </div>

  <div class="pbar" id="bar-opp">
    <div class="pname">
      <div class="dot" id="dot-opp"></div>
      <span id="lbl-opp">Opponent</span>
    </div>
    <div class="timer" id="t-opp">10:00</div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="overlay" id="overlay">
      <div class="ov-icon" id="ov-icon">⏳</div>
      <div class="ov-title" id="ov-title">Loading…</div>
      <div class="ov-sub" id="ov-sub"></div>
      <button class="btn-start hidden" id="btn-start">▶ Start My Clock</button>
    </div>
  </div>

  <div class="pbar" id="bar-me">
    <div class="pname">
      <div class="dot" id="dot-me"></div>
      <span id="lbl-me">You</span>
    </div>
    <div class="timer" id="t-me">10:00</div>
  </div>

  <div class="status-bar" id="status-bar"></div>

  <div class="controls">
    <button class="btn-share" id="btn-share">📋 Copy invite link</button>
    <button class="btn-newgame hidden" id="btn-newgame">New Game</button>
    <button class="btn-resign" id="btn-resign">Resign</button>
  </div>

  <div class="hist">
    <div class="hist-label">Move history</div>
    <div class="hist-grid" id="hist-grid"></div>
  </div>
</div>

<!-- Promotion modal -->
<div class="modal-bg hidden" id="promo-modal">
  <div class="modal">
    <h3>Promote pawn to:</h3>
    <div class="promo-row" id="promo-row"></div>
  </div>
</div>

<script>
// ================================================================
// FIREBASE CONFIG — Replace all values below.
// Get from: console.firebase.google.com → Project Settings →
// Your Apps → SDK setup → Config
// Also set Firestore rules to allow read/write (test mode is fine).
// ================================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAXw4AB59Km4N92Y67ODaiOJBmvNxmJdtw",
  authDomain:        "tidal-velocity-275918.firebaseapp.com",
  projectId:         "tidal-velocity-275918",
  storageBucket:     "tidal-velocity-275918.firebasestorage.app",
  messagingSenderId: "359357212651",
  appId:             "1:359357212651:web:5f0e7e3aaf0f06ca131bae"
};

// ================================================================
// PIECE SYMBOLS
// ================================================================
const SYM = {
  wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',
  bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟'
};

// ================================================================
// STATE
// ================================================================
let db;
let gameId = null;
let myColor = null;      // 'w' | 'b' | null (spectator)
let chess = null;
let gs = null;           // game state snapshot
let unsub = null;
let ticker = null;
let selSq = null;
let validTargets = [];
let pendingPromo = null;

// ================================================================
// FIREBASE INIT
// ================================================================
try { firebase.initializeApp(FIREBASE_CONFIG); } catch(e) {}
db = firebase.firestore();

// ================================================================
// HOME — time control selection
// ================================================================
let chosenMs = 600000;
document.querySelectorAll('.time-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.time-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    chosenMs = parseInt(b.dataset.ms);
  });
});

document.getElementById('btn-create').addEventListener('click', createGame);
document.getElementById('btn-join').addEventListener('click', () => {
  const code = document.getElementById('join-input').value.trim().toUpperCase();
  if (code.length < 4) return alert('Enter a valid game code.');
  joinGame(code);
});

// Auto-join if URL has ?game=
const urlGame = new URLSearchParams(location.search).get('game');
if (urlGame) joinGame(urlGame.toUpperCase());

// ================================================================
// CREATE GAME
// ================================================================
function genId() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => c[Math.random()*c.length|0]).join('');
}

async function createGame() {
  const id = genId();
  const data = {
    fen: new Chess().fen(),
    turn: 'w',
    wMs: chosenMs, bMs: chosenMs,
    timeCtrl: chosenMs,
    timerOn: false,
    turnAt: null,
    status: 'waiting',
    winner: null, winReason: null,
    moves: [],
    lastFrom: null, lastTo: null,
    createdAt: Date.now()
  };
  try {
    await db.collection('games').doc(id).set(data);
    gameId = id; myColor = 'w';
    localStorage.setItem('role_'+id, 'w');
    pushUrl(id);
    enterGame();
  } catch(e) { alert('Firebase error — check config.\n'+e.message); }
}

// ================================================================
// JOIN GAME
// ================================================================
async function joinGame(id) {
  try {
    const ref = db.collection('games').doc(id);
    const snap = await ref.get();
    if (!snap.exists) return alert('Game not found: ' + id);
    const data = snap.data();

    const saved = localStorage.getItem('role_'+id);
    if (saved) {
      gameId = id; myColor = saved;
      pushUrl(id); enterGame(); return;
    }

    if (data.status === 'waiting') {
      await ref.update({ status: 'active' });
      gameId = id; myColor = 'b';
      localStorage.setItem('role_'+id, 'b');
    } else {
      gameId = id; myColor = null; // spectator
    }
    pushUrl(id); enterGame();
  } catch(e) { alert('Join failed.\n'+e.message); }
}

function pushUrl(id) {
  const u = new URL(location.href);
  u.searchParams.set('game', id);
  history.pushState({}, '', u);
}

// ================================================================
// ENTER GAME VIEW
// ================================================================
function enterGame() {
  document.getElementById('view-home').classList.add('hidden');
  document.getElementById('view-game').classList.remove('hidden');

  const iW = myColor === 'w';
  const myClr = iW ? 'white' : (myColor === 'b' ? 'black' : '—');
  const opClr = iW ? 'black' : 'white';

  document.getElementById('gid-label').textContent = gameId;
  document.getElementById('color-label').textContent = myColor ? `You are ${myClr}` : 'Spectating';
  document.getElementById('lbl-me').textContent = `You (${myClr})`;
  document.getElementById('lbl-opp').textContent = `Opponent (${opClr})`;
  document.getElementById('dot-me').className = `dot ${myColor||'w'}`;
  document.getElementById('dot-opp').className = `dot ${iW?'b':'w'}`;

  document.getElementById('gid-label').onclick = () => copyText(gameId);
  document.getElementById('btn-share').onclick = () => {
    copyText(location.href);
    document.getElementById('btn-share').textContent = '✓ Copied!';
    setTimeout(() => document.getElementById('btn-share').textContent = '📋 Copy invite link', 2000);
  };
  document.getElementById('btn-start').onclick = startTimer;
  document.getElementById('btn-resign').onclick = resign;
  document.getElementById('btn-newgame').onclick = () => {
    history.pushState({}, '', location.pathname);
    location.reload();
  };

  unsub = db.collection('games').doc(gameId).onSnapshot(snap => {
    if (snap.exists) { gs = snap.data(); onUpdate(); }
  });
}

function copyText(t) {
  navigator.clipboard.writeText(t).catch(() => prompt('Copy this:', t));
}

// ================================================================
// GAME UPDATE HANDLER
// ================================================================
function onUpdate() {
  chess = new Chess();
  chess.load(gs.fen);
  renderBoard();
  renderOverlay();
  renderTimers();
  renderStatus();
  renderHistory();
  renderPlayerBars();

  // Manage live tick
  if (gs.timerOn && gs.status === 'active') {
    if (!ticker) ticker = setInterval(renderTimers, 400);
  } else {
    clearInterval(ticker); ticker = null;
    renderTimers(); // final update
  }
}

// ================================================================
// RENDER OVERLAY
// ================================================================
function renderOverlay() {
  const ov = document.getElementById('overlay');
  const icon = document.getElementById('ov-icon');
  const title = document.getElementById('ov-title');
  const sub = document.getElementById('ov-sub');
  const startBtn = document.getElementById('btn-start');

  startBtn.classList.add('hidden');

  if (gs.status === 'finished') {
    ov.classList.remove('hidden');
    icon.textContent = '🏁';
    if (gs.winner === 'draw') {
      title.textContent = 'Draw';
      sub.textContent = gs.winReason || '';
    } else if (gs.winner === myColor) {
      title.textContent = 'You win! 🎉';
      sub.textContent = gs.winReason || '';
    } else {
      title.textContent = 'You lose.';
      sub.textContent = gs.winReason || '';
    }
    document.getElementById('btn-newgame').classList.remove('hidden');
    document.getElementById('btn-resign').classList.add('hidden');
    return;
  }

  if (gs.status === 'waiting') {
    ov.classList.remove('hidden');
    icon.textContent = '🔗';
    title.textContent = 'Waiting for opponent';
    sub.textContent = 'Share the invite link below so your friend can join as Black.';
    return;
  }

  const myTurn = gs.turn === myColor;

  if (!myTurn) {
    ov.classList.remove('hidden');
    icon.textContent = '⏳';
    title.textContent = (gs.turn === 'w' ? 'White' : 'Black') + '\'s turn';
    sub.textContent = gs.lastTo
      ? `Last move ended on ${gs.lastTo}`
      : 'Your opponent hasn\'t moved yet.';
    return;
  }

  // My turn
  if (!gs.timerOn) {
    ov.classList.remove('hidden');
    icon.textContent = '🎯';
    title.textContent = 'Your turn!';
    sub.textContent = 'Press Start to begin your clock and reveal the board.';
    startBtn.classList.remove('hidden');
    return;
  }

  // My turn + timer running → hide overlay, show board
  ov.classList.add('hidden');
}

// ================================================================
// RENDER TIMERS
// ================================================================
function renderTimers() {
  if (!gs) return;
  let wMs = gs.wMs, bMs = gs.bMs;
  if (gs.timerOn && gs.turnAt) {
    const e = Date.now() - gs.turnAt;
    if (gs.turn === 'w') wMs = Math.max(0, wMs - e);
    else bMs = Math.max(0, bMs - e);
  }
  const meMs = myColor === 'w' ? wMs : bMs;
  const opMs = myColor === 'w' ? bMs : wMs;

  function fmt(ms) {
    const s = Math.max(0, Math.ceil(ms/1000));
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }

  const tMe = document.getElementById('t-me');
  const tOp = document.getElementById('t-opp');
  tMe.textContent = fmt(meMs);
  tOp.textContent = fmt(opMs);
  tMe.className = 'timer' + (meMs < 30000 ? ' low' : '');
  tOp.className = 'timer' + (opMs < 30000 ? ' low' : '');

  // Auto timeout detection
  if (gs.timerOn && gs.status === 'active' && gs.turn === myColor && meMs <= 0) {
    doTimeout();
  }
}

async function doTimeout() {
  clearInterval(ticker); ticker = null;
  const opp = myColor === 'w' ? 'b' : 'w';
  await db.collection('games').doc(gameId).update({
    status:'finished', winner:opp,
    winReason:(myColor==='w'?'White':'Black')+' ran out of time',
    timerOn:false
  }).catch(()=>{});
}

// ================================================================
// RENDER BOARD
// ================================================================
function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  const flip = myColor === 'b';

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = sqName(r, c, flip);
      const piece = chess.get(sq);
      const lite = (sq.charCodeAt(0)-97 + parseInt(sq[1])-1) % 2 === 1;

      const div = document.createElement('div');
      div.className = `sq ${lite?'lt':'dk'}`;
      div.dataset.sq = sq;

      if (sq === selSq) div.classList.add('sel');
      if (sq === gs.lastFrom) div.classList.add('lf');
      if (sq === gs.lastTo) div.classList.add('lt2');
      if (chess.in_check() && piece && piece.type==='k' && piece.color===chess.turn())
        div.classList.add('chk');
      if (validTargets.includes(sq))
        div.classList.add(piece ? 'vc' : 'vm');

      if (piece) div.textContent = SYM[piece.color + piece.type.toUpperCase()];
      div.onclick = () => onSqClick(sq);
      el.appendChild(div);
    }
  }
}

function sqName(r, c, flip) {
  const f = 'abcdefgh';
  return (flip ? f[7-c] : f[c]) + (flip ? r+1 : 8-r);
}

// ================================================================
// SQUARE CLICK
// ================================================================
function onSqClick(sq) {
  if (!myColor || gs.status !== 'active') return;
  if (gs.turn !== myColor || !gs.timerOn) return;

  const piece = chess.get(sq);

  if (!selSq) {
    if (piece && piece.color === myColor) {
      selSq = sq;
      validTargets = chess.moves({square:sq, verbose:true}).map(m=>m.to);
      renderBoard();
    }
    return;
  }

  if (sq === selSq) {
    selSq = null; validTargets = [];
    renderBoard(); return;
  }

  if (validTargets.includes(sq)) {
    const mp = chess.get(selSq);
    const toRank = parseInt(sq[1]);
    if (mp.type==='p' && ((myColor==='w'&&toRank===8)||(myColor==='b'&&toRank===1))) {
      pendingPromo = {from:selSq, to:sq};
      selSq=null; validTargets=[];
      showPromo(); return;
    }
    doMove(selSq, sq, null);
  } else if (piece && piece.color === myColor) {
    selSq = sq;
    validTargets = chess.moves({square:sq, verbose:true}).map(m=>m.to);
    renderBoard();
  } else {
    selSq=null; validTargets=[];
    renderBoard();
  }
}

// ================================================================
// MAKE MOVE
// ================================================================
async function doMove(from, to, promo) {
  const mv = chess.move({from, to, promotion: promo||undefined});
  if (!mv) return;

  const elapsed = gs.turnAt ? Date.now() - gs.turnAt : 0;
  const myKey = myColor==='w' ? 'wMs' : 'bMs';
  const newTime = Math.max(0, gs[myKey] - elapsed);

  let status='active', winner=null, winReason=null;
  if (newTime<=0) {
    status='finished'; winner=myColor==='w'?'b':'w';
    winReason=(myColor==='w'?'White':'Black')+' ran out of time';
  } else if (chess.in_checkmate()) {
    status='finished'; winner=myColor; winReason='Checkmate';
  } else if (chess.in_stalemate()) {
    status='finished'; winner='draw'; winReason='Stalemate';
  } else if (chess.in_draw()) {
    status='finished'; winner='draw';
    winReason=chess.insufficient_material()?'Insufficient material':
              chess.in_threefold_repetition()?'Threefold repetition':'50-move rule';
  }

  selSq=null; validTargets=[];

  await db.collection('games').doc(gameId).update({
    fen: chess.fen(),
    turn: chess.turn(),
    [myKey]: newTime,
    timerOn: false,
    turnAt: null,
    status, winner, winReason,
    moves: firebase.firestore.FieldValue.arrayUnion(mv.san),
    lastFrom: from,
    lastTo: to
  }).catch(e => alert('Save failed: '+e.message));
}

// ================================================================
// PROMOTION MODAL
// ================================================================
function showPromo() {
  const row = document.getElementById('promo-row');
  row.innerHTML = '';
  ['Q','R','B','N'].forEach(t => {
    const b = document.createElement('button');
    b.className='pbtn';
    b.textContent = SYM[myColor+t];
    b.onclick = () => {
      document.getElementById('promo-modal').classList.add('hidden');
      doMove(pendingPromo.from, pendingPromo.to, t.toLowerCase());
      pendingPromo=null;
    };
    row.appendChild(b);
  });
  document.getElementById('promo-modal').classList.remove('hidden');
}

// ================================================================
// START TIMER
// ================================================================
async function startTimer() {
  if (!myColor || gs.turn!==myColor || gs.timerOn) return;
  await db.collection('games').doc(gameId).update({
    timerOn: true,
    turnAt: Date.now()
  }).catch(e=>alert('Could not start timer: '+e.message));
}

// ================================================================
// RESIGN
// ================================================================
async function resign() {
  if (!myColor || gs.status==='finished') return;
  if (!confirm('Resign this game?')) return;
  const opp = myColor==='w'?'b':'w';
  await db.collection('games').doc(gameId).update({
    status:'finished', winner:opp,
    winReason:(myColor==='w'?'White':'Black')+' resigned',
    timerOn:false
  });
}

// ================================================================
// STATUS BAR
// ================================================================
function renderStatus() {
  const bar = document.getElementById('status-bar');
  if (!gs || gs.status==='finished') { bar.textContent=''; return; }
  if (chess.in_check()) {
    bar.textContent = `⚠️ ${chess.turn()==='w'?'White':'Black'} is in check`;
  } else if (gs.turn===myColor && gs.timerOn) {
    bar.textContent = '⏱ Your clock is running — make your move!';
  } else {
    bar.textContent = '';
  }
}

// ================================================================
// PLAYER BARS
// ================================================================
function renderPlayerBars() {
  const myTurn = gs.turn===myColor && gs.status==='active';
  document.getElementById('bar-me').classList.toggle('active-turn', myTurn);
  document.getElementById('bar-opp').classList.toggle('active-turn', !myTurn && gs.status==='active');
}

// ================================================================
// MOVE HISTORY
// ================================================================
function renderHistory() {
  const grid = document.getElementById('hist-grid');
  const moves = gs.moves || [];
  grid.innerHTML = '';
  for (let i=0; i<moves.length; i+=2) {
    const n=document.createElement('span'); n.className='mn'; n.textContent=(i/2+1)+'.';
    const w=document.createElement('span'); w.className='ms'; w.textContent=moves[i]||'';
    const b=document.createElement('span'); b.className='ms'; b.textContent=moves[i+1]||'';
    grid.append(n,w,b);
  }
  grid.parentElement.scrollTop = grid.parentElement.scrollHeight;
}
</script>
