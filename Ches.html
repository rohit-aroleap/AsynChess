<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AsynChess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#fafaf9;
  --surface:#ffffff;
  --surface-2:#f5f5f4;
  --border:#e7e5e4;
  --border-strong:#d6d3d1;
  --text:#1c1917;
  --text-2:#57534e;
  --text-3:#a8a29e;
  --primary:#0c0a09;
  --primary-hover:#292524;
  --success:#15803d;
  --success-bg:#f0fdf4;
  --success-border:#bbf7d0;
  --danger:#b91c1c;
  --danger-bg:#fef2f2;
  --warn:#b45309;
  --accent:#4338ca;
  --shadow-xs:0 1px 2px rgba(17,24,39,.04);
  --shadow-sm:0 1px 3px rgba(17,24,39,.06),0 1px 2px rgba(17,24,39,.04);
  --shadow:0 4px 12px rgba(17,24,39,.06),0 2px 4px rgba(17,24,39,.04);
  --shadow-lg:0 12px 32px rgba(17,24,39,.08),0 4px 12px rgba(17,24,39,.05);
  --radius-sm:8px;
  --radius:12px;
  --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg)}
body{
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-feature-settings:"cv02","cv03","cv04","cv11";
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 20px 56px;
  background-image:
    radial-gradient(ellipse 800px 400px at 50% -100px,rgba(67,56,202,.05),transparent 70%),
    radial-gradient(ellipse 600px 300px at 10% 100%,rgba(180,83,9,.04),transparent 70%);
  letter-spacing:-0.01em;
}

/* Header */
.hdr{text-align:center;margin-bottom:32px}
.hdr-logo{
  display:inline-flex;align-items:center;gap:10px;
  padding:6px 14px 6px 10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:999px;
  box-shadow:var(--shadow-xs);
  margin-bottom:14px;
  font-size:.78rem;font-weight:600;color:var(--text-2);
  letter-spacing:.01em;
}
.hdr-logo-dot{width:18px;height:18px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7rem}
.hdr h1{font-size:2.25rem;font-weight:800;color:var(--text);letter-spacing:-0.035em;line-height:1.1}
.hdr .ver{font-size:.72rem;color:var(--text-3);margin:8px 0 4px;font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
.hdr .tag{font-size:.95rem;color:var(--text-2);margin-top:6px;max-width:440px}

/* ── HOME ── */
#view-home{display:flex;flex-direction:column;align-items:center;width:100%;max-width:440px}
.card{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:24px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
}
.card-title{font-size:.7rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.tbtn{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text-2);
  padding:12px 4px;
  cursor:pointer;
  font-family:inherit;
  font-size:.78rem;font-weight:500;
  transition:all .15s cubic-bezier(.4,0,.2,1);
  text-align:center;line-height:1.2;
}
.tbtn .num{display:block;font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:2px;letter-spacing:-.02em}
.tbtn:hover{border-color:var(--border-strong);background:var(--surface-2);transform:translateY(-1px)}
.tbtn.sel{background:var(--primary);border-color:var(--primary);color:rgba(255,255,255,.7)}
.tbtn.sel .num{color:#fff}
.btn-primary{
  width:100%;
  background:var(--primary);
  color:#fff;
  border:1px solid var(--primary);
  border-radius:var(--radius-sm);
  padding:13px 16px;
  font-family:inherit;
  font-size:.95rem;font-weight:600;
  cursor:pointer;
  transition:background .15s,transform .1s;
  letter-spacing:-.01em;
}
.btn-primary:hover{background:var(--primary-hover)}
.btn-primary:active{transform:scale(.99)}
.join-row{display:flex;gap:8px}
.join-row input{
  flex:1;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  padding:12px 14px;
  font-family:'JetBrains Mono',monospace;font-size:.92rem;font-weight:500;
  letter-spacing:.05em;
  transition:border-color .15s;
}
.join-row input::placeholder{color:var(--text-3);font-family:'Inter',sans-serif;letter-spacing:0;font-weight:400}
.join-row input:focus{outline:none;border-color:var(--primary)}
.join-row .btn-primary{width:auto;padding:12px 18px;white-space:nowrap}
.cfg-note{color:var(--text-3);font-size:.75rem;text-align:center;margin-top:8px;line-height:1.6}
.cfg-note code{color:var(--accent);background:var(--surface);padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.72rem}

/* ── GAME ── */
#view-game{display:flex;flex-direction:column;align-items:center;width:100%}
.game-meta{
  display:flex;align-items:center;gap:10px;
  margin-bottom:18px;
  font-size:.78rem;color:var(--text-2);font-weight:500;
}
.gid-pill{
  font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:600;
  background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:5px 14px;
  color:var(--text);cursor:pointer;letter-spacing:.08em;
  box-shadow:var(--shadow-xs);
  transition:all .15s;
}
.gid-pill:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}
.you-label{
  color:var(--accent);font-weight:600;font-size:.78rem;
  background:#eef2ff;padding:4px 10px;border-radius:999px;
  border:1px solid #e0e7ff;
}

/* Player bars */
.pbar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 16px;
  margin:5px 0;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  width:100%;max-width:520px;
  box-shadow:var(--shadow-xs);
}
.pbar.active-bar{
  border-color:var(--success-border);
  background:var(--success-bg);
  box-shadow:0 0 0 3px rgba(22,163,74,.08),var(--shadow-xs);
}
.pinfo{display:flex;align-items:center;gap:12px}
.av{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;flex-shrink:0;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);
}
.av-w{background:linear-gradient(135deg,#fff 0%,#f5f5f4 100%);color:#1c1917}
.av-b{background:linear-gradient(135deg,#1c1917 0%,#0c0a09 100%);color:#f5f5f4}
.pname{font-weight:600;font-size:.92rem;color:var(--text);letter-spacing:-.01em}
.ptag{font-size:.72rem;color:var(--text-3);margin-top:1px;font-weight:500}
.pbar.active-bar .ptag{color:var(--success)}
.timer{
  font-size:1.65rem;font-weight:700;
  font-family:'JetBrains Mono',monospace;
  color:var(--text);letter-spacing:-.02em;
  padding:4px 12px;
  border-radius:var(--radius-sm);
  background:transparent;
  transition:all .25s;
  font-variant-numeric:tabular-nums;
}
.pbar.active-bar .timer{background:#dcfce7;color:#14532d}
.timer.danger{color:var(--danger)!important;background:var(--danger-bg)!important;animation:blink .9s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* Board */
.board-wrap{
  position:relative;margin:6px 0;
  width:100%;max-width:520px;
  padding:10px;
  background:linear-gradient(145deg,#4a3826 0%,#3d2f20 100%);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg),inset 0 0 0 1px rgba(255,255,255,.06);
}
#chessboard{width:100%;border-radius:6px;overflow:hidden}
.board-b72b1{border-radius:6px!important;border:none!important}

/* Notation */
.notation-322f9{color:rgba(30,20,10,.55)!important;font-family:'Inter',sans-serif!important;font-weight:600!important;font-size:11px!important}

/* Square highlights */
.square-55d63{position:relative;transition:background-color .1s}
.hl-sel{background:rgba(34,197,94,.55)!important}
.hl-lf{background:rgba(250,204,21,.35)!important}
.hl-lt{background:rgba(250,204,21,.58)!important}
.hl-mv::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30%;height:30%;border-radius:50%;background:rgba(30,20,10,.28);pointer-events:none;z-index:5}
.hl-cap::after{content:'';position:absolute;inset:4%;border-radius:50%;border:4px solid rgba(30,20,10,.32);pointer-events:none;z-index:5;box-sizing:border-box}

/* Overlay */
.overlay{
  position:absolute;inset:10px;
  background:rgba(250,250,249,.97);
  backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:50;
  border-radius:6px;
}
.ov-icon{font-size:2.6rem;line-height:1}
.ov-title{font-size:1.25rem;font-weight:700;color:var(--text);text-align:center;letter-spacing:-.02em}
.ov-sub{font-size:.88rem;color:var(--text-2);text-align:center;max-width:280px;line-height:1.6}
.ov-last{
  font-size:.74rem;color:var(--text-2);font-family:'JetBrains Mono',monospace;
  background:var(--surface);padding:5px 12px;border-radius:999px;
  border:1px solid var(--border);font-weight:600;letter-spacing:.03em;
}
.btn-start{
  background:var(--primary);color:#fff;
  border:none;border-radius:var(--radius-sm);
  padding:14px 32px;margin-top:4px;
  font-family:inherit;font-size:.95rem;font-weight:600;
  cursor:pointer;letter-spacing:-.01em;
  box-shadow:var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,.08);
  transition:all .15s cubic-bezier(.4,0,.2,1);
}
.btn-start:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-start:active{transform:translateY(0)}

/* Status */
.sbar{width:100%;max-width:520px;min-height:32px;font-size:.82rem;color:var(--text-2);text-align:center;padding:8px 0;font-weight:500}
.sbar.warn{color:var(--warn)}
.sbar.chk{color:var(--danger);font-weight:600}

/* Controls */
.ctrls{display:flex;gap:8px;width:100%;max-width:520px;margin:4px 0}
.btn-share{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-2);
  padding:10px 14px;font-family:inherit;font-size:.82rem;font-weight:500;
  cursor:pointer;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  transition:all .15s;box-shadow:var(--shadow-xs);
}
.btn-share:hover{border-color:var(--border-strong);color:var(--text);background:var(--surface-2)}
.btn-resign{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--danger);
  padding:10px 16px;font-family:inherit;font-size:.82rem;font-weight:500;
  cursor:pointer;transition:all .15s;box-shadow:var(--shadow-xs);
}
.btn-resign:hover{background:var(--danger-bg);border-color:#fecaca}
.btn-new{
  background:var(--primary);border:1px solid var(--primary);
  border-radius:var(--radius-sm);color:#fff;
  padding:10px 18px;font-family:inherit;font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.btn-new:hover{background:var(--primary-hover)}

/* History */
.hist{
  width:100%;max-width:520px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 18px;max-height:150px;overflow-y:auto;margin:6px 0;
  box-shadow:var(--shadow-xs);
}
.hist::-webkit-scrollbar{width:6px}
.hist::-webkit-scrollbar-track{background:transparent}
.hist::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.hlabel{font-size:.68rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.mgrid{display:grid;grid-template-columns:28px 1fr 1fr;gap:3px 10px}
.mn{color:var(--text-3);font-size:.82rem;font-family:'JetBrains Mono',monospace;font-weight:500}
.ms{color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:500}

/* Promo modal */
.promo-bg{position:fixed;inset:0;background:rgba(12,10,9,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.promo-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:26px;text-align:center;box-shadow:var(--shadow-lg)}
.promo-box h3{margin-bottom:18px;color:var(--text);font-size:1rem;font-weight:600;letter-spacing:-.01em}
.promo-row{display:flex;gap:10px}
.ppbtn{
  width:72px;height:72px;background:var(--surface-2);border:2px solid var(--border);
  border-radius:var(--radius-sm);cursor:pointer;padding:6px;overflow:hidden;
  transition:all .15s;
}
.ppbtn:hover{border-color:var(--primary);background:#fff;transform:translateY(-2px);box-shadow:var(--shadow)}
.ppbtn img{width:100%;height:100%}

.hidden{display:none!important}

@media (max-width:480px){
  body{padding:24px 14px 40px}
  .hdr h1{font-size:1.85rem}
  .card{padding:20px}
  .timer{font-size:1.45rem}
  .av{width:36px;height:36px;font-size:1.1rem}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo"><span class="hdr-logo-dot">♞</span>AsynChess</div>
  <h1>Play chess, on your schedule.</h1>
  <p class="ver">v1.004</p>
  <p class="tag">A chess clock that only ticks while you're looking. Spread one game across days.</p>
</div>

<!-- HOME -->
<div id="view-home">
  <div class="card">
    <p class="card-title">New Game · Time per player</p>
    <div class="time-grid" id="time-grid">
      <button class="tbtn" data-ms="300000"><span class="num">5</span>min</button>
      <button class="tbtn sel" data-ms="600000"><span class="num">10</span>min</button>
      <button class="tbtn" data-ms="900000"><span class="num">15</span>min</button>
      <button class="tbtn" data-ms="1800000"><span class="num">30</span>min</button>
    </div>
    <button class="btn-primary" id="btn-create">Create Game · You play White ♔</button>
  </div>
  <div class="card">
    <p class="card-title">Join Existing Game</p>
    <div class="join-row">
      <input id="join-input" type="text" placeholder="Enter game code" maxlength="8" style="text-transform:uppercase"/>
      <button class="btn-primary" id="btn-join">Join →</button>
    </div>
  </div>
  <p class="cfg-note">Powered by Firebase Firestore</p>
</div>

<!-- GAME -->
<div id="view-game" class="hidden">
  <div class="game-meta">
    <span>Game</span>
    <span class="gid-pill" id="gid-label"></span>
    <span class="you-label" id="color-label"></span>
  </div>

  <div class="pbar" id="bar-opp">
    <div class="pinfo">
      <div class="av" id="av-opp"></div>
      <div><div class="pname" id="pname-opp">Opponent</div><div class="ptag" id="ptag-opp">Waiting...</div></div>
    </div>
    <div class="timer" id="t-opp">—:——</div>
  </div>

  <div class="board-wrap" id="board-wrap">
    <div id="chessboard"></div>
    <div class="overlay" id="overlay">
      <div class="ov-icon" id="ov-icon">⏳</div>
      <div class="ov-title" id="ov-title">Loading…</div>
      <div class="ov-sub" id="ov-sub"></div>
      <div class="ov-last hidden" id="ov-last"></div>
      <button class="btn-start hidden" id="btn-start">Start My Clock →</button>
    </div>
  </div>

  <div class="pbar" id="bar-me">
    <div class="pinfo">
      <div class="av" id="av-me"></div>
      <div><div class="pname" id="pname-me">You</div><div class="ptag" id="ptag-me">Your turn</div></div>
    </div>
    <div class="timer" id="t-me">—:——</div>
  </div>

  <div class="sbar" id="sbar"></div>

  <div class="ctrls">
    <button class="btn-share" id="btn-share">🔗  Copy invite link</button>
    <button class="btn-new hidden" id="btn-new">New Game</button>
    <button class="btn-resign" id="btn-resign">Resign</button>
  </div>

  <div class="hist">
    <div class="hlabel">Moves</div>
    <div class="mgrid" id="mgrid"></div>
  </div>
</div>

<!-- Promotion -->
<div class="promo-bg hidden" id="promo-modal">
  <div class="promo-box">
    <h3>Promote to</h3>
    <div class="promo-row" id="promo-row"></div>
  </div>
</div>

<script>
// ── Firebase config ──
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAXw4AB59Km4N92Y67ODaiOJBmvNxmJdtw",
  authDomain:        "tidal-velocity-275918.firebaseapp.com",
  projectId:         "tidal-velocity-275918",
  storageBucket:     "tidal-velocity-275918.firebasestorage.app",
  messagingSenderId: "359357212651",
  appId:             "1:359357212651:web:5f0e7e3aaf0f06ca131bae"
};
const PIECE_URLS = {
  wK:'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
  wQ:'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
  wR:'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
  wB:'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
  wN:'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
  wP:'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg',
  bK:'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
  bQ:'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
  bR:'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
  bB:'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
  bN:'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
  bP:'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
};

// ── State ──
let db, board;
let gameId=null, myColor=null, chess=null, gs=null;
let unsub=null, ticker=null, selSq=null, validTargets=[], pendingPromo=null;

try{ firebase.initializeApp(FIREBASE_CONFIG); }catch(e){}
db = firebase.firestore();

// ── Home ──
let chosenMs = 600000;
document.querySelectorAll('.tbtn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('sel'));
  b.classList.add('sel'); chosenMs=parseInt(b.dataset.ms);
}));
document.getElementById('btn-create').addEventListener('click', createGame);
document.getElementById('btn-join').addEventListener('click', () => {
  const c=document.getElementById('join-input').value.trim().toUpperCase();
  if(c.length<4) return alert('Enter a valid game code.');
  joinGame(c);
});
const urlG = new URLSearchParams(location.search).get('game');
if(urlG) joinGame(urlG.toUpperCase());

function genId(){ return Array.from({length:6},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.random()*32|0]).join(''); }

async function createGame(){
  const id=genId();
  try{
    await db.collection('games').doc(id).set({
      fen:new Chess().fen(), turn:'w', wMs:chosenMs, bMs:chosenMs, timeCtrl:chosenMs,
      timerOn:false, turnAt:null, status:'waiting', winner:null, winReason:null,
      moves:[], lastFrom:null, lastTo:null, createdAt:Date.now()
    });
    gameId=id; myColor='w';
    localStorage.setItem('role_'+id,'w');
    pushUrl(id); enterGame();
  }catch(e){ alert('Firebase error — check config.\n'+e.message); }
}

async function joinGame(id){
  try{
    const ref=db.collection('games').doc(id);
    const snap=await ref.get();
    if(!snap.exists) return alert('Game not found: '+id);
    const saved=localStorage.getItem('role_'+id);
    if(saved){ gameId=id; myColor=saved; pushUrl(id); enterGame(); return; }
    if(snap.data().status==='waiting'){
      await ref.update({status:'active'});
      gameId=id; myColor='b';
      localStorage.setItem('role_'+id,'b');
    } else { gameId=id; myColor=null; }
    pushUrl(id); enterGame();
  }catch(e){ alert('Join failed.\n'+e.message); }
}

function pushUrl(id){
  const u=new URL(location.href); u.searchParams.set('game',id); history.pushState({},'',u);
}

function enterGame(){
  document.getElementById('view-home').classList.add('hidden');
  document.getElementById('view-game').classList.remove('hidden');
  const isW=myColor==='w';
  document.getElementById('gid-label').textContent=gameId;
  document.getElementById('color-label').textContent=myColor ? (isW?'Playing White':'Playing Black') : 'Spectating';
  const me=document.getElementById('av-me'), op=document.getElementById('av-opp');
  me.textContent=isW?'♔':'♚'; me.className='av '+(isW?'av-w':'av-b');
  op.textContent=isW?'♚':'♔'; op.className='av '+(isW?'av-b':'av-w');
  document.getElementById('pname-me').textContent='You · '+(isW?'White':'Black');
  document.getElementById('pname-opp').textContent='Opponent · '+(isW?'Black':'White');
  const sz=Math.min(520, window.innerWidth-40);
  document.getElementById('board-wrap').style.width=sz+'px';
  board=Chessboard('chessboard',{
    position:'start',
    orientation:myColor==='b'?'black':'white',
    draggable:true,
    pieceTheme: piece => PIECE_URLS[piece],
    showNotation:true,
    onDragStart,onDrop,onSnapEnd,
    onMouseoverSquare:onHover,
    onMouseoutSquare:onHoverOut
  });
  document.getElementById('board-wrap').addEventListener('click', e=>{
    const sq=e.target.closest('[data-square]');
    if(sq) onSqClick(sq.dataset.square);
  });
  document.getElementById('gid-label').onclick=()=>copyText(gameId);
  document.getElementById('btn-share').onclick=()=>{
    copyText(location.href);
    document.getElementById('btn-share').textContent='✓  Copied to clipboard';
    setTimeout(()=>document.getElementById('btn-share').textContent='🔗  Copy invite link',2000);
  };
  document.getElementById('btn-start').onclick=startTimer;
  document.getElementById('btn-resign').onclick=resign;
  document.getElementById('btn-new').onclick=()=>{ location.href=location.pathname; };
  unsub=db.collection('games').doc(gameId).onSnapshot(snap=>{
    if(snap.exists){ gs=snap.data(); onUpdate(); }
  });
}

function copyText(t){ navigator.clipboard.writeText(t).catch(()=>prompt('Copy:',t)); }

function onUpdate(){
  chess=new Chess(); chess.load(gs.fen);
  board.position(gs.fen,false);
  board.orientation(myColor==='b'?'black':'white');
  applyHL(); renderOverlay(); renderTimers(); renderSbar(); renderHistory(); renderPbars();
  if(gs.timerOn&&gs.status==='active'){
    if(!ticker) ticker=setInterval(renderTimers,400);
  } else { clearInterval(ticker); ticker=null; renderTimers(); }
}

function renderOverlay(){
  const ov=document.getElementById('overlay');
  const icon=document.getElementById('ov-icon'), title=document.getElementById('ov-title');
  const sub=document.getElementById('ov-sub'), last=document.getElementById('ov-last');
  const startBtn=document.getElementById('btn-start');
  last.classList.add('hidden'); startBtn.classList.add('hidden');
  if(gs.status==='finished'){
    ov.classList.remove('hidden'); icon.textContent='🏁';
    title.textContent=gs.winner==='draw'?'Draw':(gs.winner===myColor?'You won':'You lost');
    sub.textContent=gs.winReason||'';
    document.getElementById('btn-new').classList.remove('hidden');
    document.getElementById('btn-resign').classList.add('hidden');
    return;
  }
  if(gs.status==='waiting'){
    ov.classList.remove('hidden'); icon.textContent='🔗';
    title.textContent='Share the link to begin';
    sub.textContent='Your opponent joins as Black and the game starts.';
    return;
  }
  if(gs.turn!==myColor){
    ov.classList.remove('hidden'); icon.textContent='💤';
    title.textContent=(gs.turn==='w'?'White':'Black')+"'s turn";
    sub.textContent='Come back when it\'s your move. The board stays hidden to keep it fair.';
    if(gs.lastTo){ last.textContent=gs.lastFrom+' → '+gs.lastTo; last.classList.remove('hidden'); }
    return;
  }
  if(!gs.timerOn){
    ov.classList.remove('hidden'); icon.textContent='⏱';
    title.textContent='Your turn';
    sub.textContent='Your clock runs only while the board is visible. Start when you\'re ready to think.';
    startBtn.classList.remove('hidden');
    return;
  }
  ov.classList.add('hidden');
}

function renderTimers(){
  if(!gs) return;
  let wMs=gs.wMs, bMs=gs.bMs;
  if(gs.timerOn&&gs.turnAt){
    const e=Date.now()-gs.turnAt;
    if(gs.turn==='w') wMs=Math.max(0,wMs-e); else bMs=Math.max(0,bMs-e);
  }
  const meMs=myColor==='w'?wMs:bMs, opMs=myColor==='w'?bMs:wMs;
  const fmt=ms=>{ const s=Math.max(0,Math.ceil(ms/1000)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
  const tMe=document.getElementById('t-me'), tOp=document.getElementById('t-opp');
  tMe.textContent=myColor?fmt(meMs):'—'; tOp.textContent=fmt(opMs);
  tMe.className='timer'+(meMs<30000?' danger':'');
  tOp.className='timer'+(opMs<30000?' danger':'');
  if(gs.timerOn&&gs.status==='active'&&gs.turn===myColor&&meMs<=0) doTimeout();
}

async function doTimeout(){
  clearInterval(ticker); ticker=null;
  await db.collection('games').doc(gameId).update({
    status:'finished', winner:myColor==='w'?'b':'w',
    winReason:(myColor==='w'?'White':'Black')+' ran out of time', timerOn:false
  }).catch(()=>{});
}

function renderPbars(){
  const myT=gs.turn===myColor&&gs.status==='active';
  document.getElementById('bar-me').classList.toggle('active-bar',myT);
  document.getElementById('bar-opp').classList.toggle('active-bar',!myT&&gs.status==='active');
  const meTag=document.getElementById('ptag-me'), opTag=document.getElementById('ptag-opp');
  if(gs.status==='finished'){ meTag.textContent=opTag.textContent=''; return; }
  if(gs.status==='waiting'){ opTag.textContent='Waiting to join...'; meTag.textContent='Ready'; return; }
  meTag.textContent=myT?(gs.timerOn?'Clock running':'Ready to move'):'Waiting';
  opTag.textContent=myT?'Waiting':(gs.timerOn?'Thinking':'Ready to move');
}

function getSq(sq){ return document.querySelector(`.square-55d63[data-square="${sq}"]`); }
function applyHL(){
  document.querySelectorAll('.square-55d63').forEach(el=>el.classList.remove('hl-sel','hl-mv','hl-cap','hl-lf','hl-lt'));
  if(gs?.lastFrom) getSq(gs.lastFrom)?.classList.add('hl-lf');
  if(gs?.lastTo) getSq(gs.lastTo)?.classList.add('hl-lt');
  if(selSq) getSq(selSq)?.classList.add('hl-sel');
  validTargets.forEach(sq=>{ const el=getSq(sq); if(el) el.classList.add(chess.get(sq)?'hl-cap':'hl-mv'); });
}

function onDragStart(source,piece){
  if(!myColor||gs?.status!=='active'||gs.turn!==myColor||!gs.timerOn) return false;
  if(myColor==='w'&&piece.startsWith('b')) return false;
  if(myColor==='b'&&piece.startsWith('w')) return false;
  return true;
}
function onDrop(source,target){
  if(source===target) return 'snapback';
  const mp=chess.get(source);
  if(mp?.type==='p'){
    const r=parseInt(target[1]);
    if((myColor==='w'&&r===8)||(myColor==='b'&&r===1)){
      const t=chess.move({from:source,to:target,promotion:'q'}); if(!t) return 'snapback';
      chess.undo(); pendingPromo={from:source,to:target}; showPromo(); return 'snapback';
    }
  }
  const mv=chess.move({from:source,to:target}); if(!mv) return 'snapback';
  chess.undo(); selSq=null; validTargets=[];
  doMove(source,target,null);
}
function onSnapEnd(){ if(chess){ board.position(chess.fen(),false); applyHL(); } }

function onHover(sq){
  if(!myColor||gs?.status!=='active'||gs.turn!==myColor||!gs.timerOn) return;
  const p=chess.get(sq);
  if(p&&p.color===myColor){
    chess.moves({square:sq,verbose:true}).forEach(m=>{
      const el=getSq(m.to); if(el) el.classList.add(chess.get(m.to)?'hl-cap':'hl-mv');
    });
  }
}
function onHoverOut(){
  document.querySelectorAll('.square-55d63').forEach(el=>el.classList.remove('hl-mv','hl-cap'));
  validTargets.forEach(sq=>{ const el=getSq(sq); if(el) el.classList.add(chess.get(sq)?'hl-cap':'hl-mv'); });
}

function onSqClick(sq){
  if(!myColor||gs?.status!=='active'||gs.turn!==myColor||!gs.timerOn) return;
  const piece=chess.get(sq);
  if(!selSq){
    if(piece&&piece.color===myColor){
      selSq=sq; validTargets=chess.moves({square:sq,verbose:true}).map(m=>m.to); applyHL();
    }
    return;
  }
  if(sq===selSq){ selSq=null; validTargets=[]; applyHL(); return; }
  if(validTargets.includes(sq)){
    const mp=chess.get(selSq), r=parseInt(sq[1]);
    if(mp?.type==='p'&&((myColor==='w'&&r===8)||(myColor==='b'&&r===1))){
      pendingPromo={from:selSq,to:sq}; selSq=null; validTargets=[]; applyHL(); showPromo(); return;
    }
    const f=selSq,t=sq; selSq=null; validTargets=[]; applyHL(); doMove(f,t,null);
  } else if(piece&&piece.color===myColor){
    selSq=sq; validTargets=chess.moves({square:sq,verbose:true}).map(m=>m.to); applyHL();
  } else { selSq=null; validTargets=[]; applyHL(); }
}

async function doMove(from,to,promo){
  const mv=chess.move({from,to,promotion:promo||undefined}); if(!mv) return;
  const elapsed=gs.turnAt?Date.now()-gs.turnAt:0;
  const myKey=myColor==='w'?'wMs':'bMs';
  const newTime=Math.max(0,gs[myKey]-elapsed);
  let status='active',winner=null,winReason=null;
  if(newTime<=0){ status='finished'; winner=myColor==='w'?'b':'w'; winReason=(myColor==='w'?'White':'Black')+' ran out of time'; }
  else if(chess.in_checkmate()){ status='finished'; winner=myColor; winReason='Checkmate'; }
  else if(chess.in_stalemate()){ status='finished'; winner='draw'; winReason='Stalemate'; }
  else if(chess.in_draw()){ status='finished'; winner='draw'; winReason=chess.insufficient_material()?'Insufficient material':chess.in_threefold_repetition()?'Threefold repetition':'50-move rule'; }
  await db.collection('games').doc(gameId).update({
    fen:chess.fen(), turn:chess.turn(), [myKey]:newTime,
    timerOn:false, turnAt:null, status, winner, winReason,
    moves:firebase.firestore.FieldValue.arrayUnion(mv.san),
    lastFrom:from, lastTo:to
  }).catch(e=>alert('Save failed: '+e.message));
}

function showPromo(){
  const row=document.getElementById('promo-row'); row.innerHTML='';
  ['Q','R','B','N'].forEach(t=>{
    const btn=document.createElement('button'); btn.className='ppbtn';
    const img=document.createElement('img'); img.src=PIECE_URLS[myColor+t];
    btn.appendChild(img);
    btn.onclick=()=>{ document.getElementById('promo-modal').classList.add('hidden'); doMove(pendingPromo.from,pendingPromo.to,t.toLowerCase()); pendingPromo=null; };
    row.appendChild(btn);
  });
  document.getElementById('promo-modal').classList.remove('hidden');
}

async function startTimer(){
  if(!myColor||gs.turn!==myColor||gs.timerOn) return;
  await db.collection('games').doc(gameId).update({timerOn:true,turnAt:Date.now()}).catch(e=>alert('Could not start timer: '+e.message));
}

async function resign(){
  if(!myColor||gs.status==='finished') return;
  if(!confirm('Resign this game?')) return;
  await db.collection('games').doc(gameId).update({
    status:'finished', winner:myColor==='w'?'b':'w',
    winReason:(myColor==='w'?'White':'Black')+' resigned', timerOn:false
  });
}

function renderSbar(){
  const b=document.getElementById('sbar');
  if(!gs||gs.status==='finished'){ b.textContent=''; b.className='sbar'; return; }
  if(chess.in_check()){ b.textContent='⚠  '+(chess.turn()==='w'?'White':'Black')+' is in check'; b.className='sbar chk'; }
  else if(gs.turn===myColor&&gs.timerOn){ b.textContent='Clock running — make your move'; b.className='sbar warn'; }
  else{ b.textContent=''; b.className='sbar'; }
}

function renderHistory(){
  const grid=document.getElementById('mgrid'); const moves=gs.moves||[];
  grid.innerHTML='';
  for(let i=0;i<moves.length;i+=2){
    const n=document.createElement('span'); n.className='mn'; n.textContent=(i/2+1)+'.';
    const w=document.createElement('span'); w.className='ms'; w.textContent=moves[i]||'';
    const b=document.createElement('span'); b.className='ms'; b.textContent=moves[i+1]||'';
    grid.append(n,w,b);
  }
  grid.parentElement.scrollTop=grid.parentElement.scrollHeight;
}
</script>
</body>
